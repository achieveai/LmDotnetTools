# Sandbox SDK live-contract CI.
#
# Runs the Sandbox.Integration.Tests matrix against the REAL published gateway with
# AUTH_ENFORCE=true and the Docker backend — no mocks, no in-process fakes. This
# is the only sandbox backend that runs on GitHub-hosted runners (the gateway's
# `local` backend is Windows-only; its native-Linux jail backend needs self-hosted
# VMs with real kernel primitives). The Docker backend gives the SDK the POSIX
# `/workspace` contract its command/file orchestration is built on, and matches
# what real SDK consumers (Linux Docker sandboxes) actually hit.
#
# Images are pulled from GHCR (private to the achieveai org):
#   ghcr.io/achieveai/mcp-gateway        — the gateway host process (containerized)
#   ghcr.io/achieveai/llm-sandbox-agent  — the per-sandbox agent image the gateway execs into
#
# ACCESS: the built-in GITHUB_TOKEN (permissions: packages: read) can pull these
# when the packages grant read access to this repo. If that access is not granted,
# set repo secret SANDBOX_GHCR_TOKEN to a token (read:packages) and it is preferred.
# Forks never run (owner gate).
name: Sandbox Live Contract

on:
  pull_request:
    paths:
      - 'src/Sandbox/**'
      - 'tests/Sandbox.Integration.Tests/**'
      - '.github/workflows/sandbox-contract.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: sandbox-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the gateway + agent image tag the SDK contract is verified against.
  # Bump deliberately when adopting a newer gateway contract.
  # 0.1.3 is the first published image that includes the direct file/command REST
  # APIs (ADR 0031 / issue #119) this SDK now targets; older tags return 424
  # operation_api_unavailable for ExecuteAsync.
  IMAGE_TAG: '0.1.3'
  GATEWAY_IMAGE: ghcr.io/achieveai/mcp-gateway
  AGENT_IMAGE: ghcr.io/achieveai/llm-sandbox-agent
  GATEWAY_PORT: '3987'
  GATEWAY_APP_ID: wi187-ci

jobs:
  sandbox-contract:
    name: Live contract (Docker backend, auth-enforced)
    runs-on: ubuntu-latest
    # Only the upstream org has the private images; forks skip entirely.
    if: github.repository_owner == 'achieveai'
    timeout-minutes: 25
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            8.0.x

      - name: Log in to GHCR
        # Prefer a dedicated read:packages PAT when configured; otherwise fall back
        # to the workflow token (works when the packages grant this repo read access).
        env:
          GHCR_TOKEN: ${{ secrets.SANDBOX_GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull gateway + agent images
        run: |
          docker pull "${GATEWAY_IMAGE}:${IMAGE_TAG}"
          docker pull "${AGENT_IMAGE}:${IMAGE_TAG}"

      # Warm the agent image once outside the assertion window: the very first
      # sandbox container after a fresh pull can transiently fail its first exec
      # while image layers unpack. Failures here are non-fatal.
      - name: Warm agent image
        run: docker run --rm "${AGENT_IMAGE}:${IMAGE_TAG}" /bin/agent-cli list --path /workspace || true

      - name: Generate ephemeral credentials
        id: authcreds
        run: |
          app_secret="$(openssl rand -base64 32)"
          proxy_cred="$(openssl rand -base64 32)"
          echo "::add-mask::$app_secret"
          echo "::add-mask::$proxy_cred"
          echo "app_secret=$app_secret" >> "$GITHUB_OUTPUT"
          echo "proxy_cred=$proxy_cred" >> "$GITHUB_OUTPUT"

      - name: Start gateway container (Docker backend, AUTH_ENFORCE=true)
        env:
          APP_SECRET: ${{ steps.authcreds.outputs.app_secret }}
          PROXY_CRED: ${{ steps.authcreds.outputs.proxy_cred }}
        run: |
          set -euo pipefail
          # Host workspace base. The gateway validates paths against this dir and
          # passes them UNCHANGED to the host Docker daemon when spawning agent
          # containers, so it must be bind-mounted at the SAME path inside the
          # gateway container (compose's documented same-path-in-and-out pattern).
          # The mount is RW (not :ro): the gateway provisions per-sandbox
          # subdirectories under WORKSPACE_BASE_PATH; a read-only mount fails
          # sandbox create with "Read-only file system (os error 30)" -> HTTP 500.
          ws="${GITHUB_WORKSPACE}/gw-dws"
          mkdir -p "$ws"
          # The gateway container runs as a non-root user (uid 1000 'gateway') and
          # provisions per-sandbox subdirectories under WORKSPACE_BASE_PATH. On the
          # native-Linux runner the bind mount preserves host ownership, so a dir
          # created by the runner user is NOT writable by uid 1000 -> create fails
          # with "Permission denied (os error 13)" -> HTTP 500. Make the base dir
          # world-writable so the gateway user can create sandbox subdirectories.
          chmod 0777 "$ws"
          # The gateway talks to the host Docker socket via bollard; it must be in
          # the socket's group to open it.
          docker_gid="$(stat -c '%g' /var/run/docker.sock)"
          docker run -d --name wi187-gateway \
            -p "127.0.0.1:${GATEWAY_PORT}:3000" \
            --group-add "$docker_gid" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$ws:$ws" \
            -e BIND_ADDRESS=0.0.0.0 \
            -e PORT=3000 \
            -e SANDBOX_BACKEND=docker \
            -e "SANDBOX_IMAGE=${AGENT_IMAGE}:${IMAGE_TAG}" \
            -e SANDBOX_NETWORK=bridge \
            -e "WORKSPACE_BASE_PATH=$ws" \
            -e EGRESS_PROXY_URL= \
            -e AUTH_ENFORCE=true \
            -e "APP_SECRETS=${GATEWAY_APP_ID}=${APP_SECRET}" \
            -e "PROXY_SERVICE_CRED=${PROXY_CRED}" \
            -e "GATEWAY_PROXY_CRED=${PROXY_CRED}" \
            -e DB_PATH=/tmp/gw.db \
            "${GATEWAY_IMAGE}:${IMAGE_TAG}"

      - name: Wait for gateway health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:${GATEWAY_PORT}/health" > /dev/null; then
              echo "Gateway healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway did not become healthy in 60s" >&2
          docker logs wi187-gateway >&2 || true
          exit 1

      - name: Run live contract matrix (net8.0 + net9.0)
        env:
          SANDBOX_BASE_URL: http://127.0.0.1:${{ env.GATEWAY_PORT }}
          SANDBOX_APP_ID: ${{ env.GATEWAY_APP_ID }}
          SANDBOX_APP_KEY: ${{ steps.authcreds.outputs.app_secret }}
          # Absence of a usable gateway is a HARD failure here (no silent skip).
          SANDBOX_CONTRACT_REQUIRED: 'true'
        run: >-
          dotnet test tests/Sandbox.Integration.Tests/AchieveAi.LmDotnetTools.Sandbox.Integration.Tests.csproj
          -c Release

      - name: Dump gateway log on failure
        if: failure()
        run: docker logs wi187-gateway || true

      - name: Stop gateway
        if: always()
        run: docker rm -f wi187-gateway || true
